# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: replay_normal_largecorpus_multiview_cnsl
  - override /model: v2/xlsr_conformertcm_mdt_lora
  - override /callbacks: default_lora_loss_earlystop_logger
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["replay_normal_largecorpus_multiview_cnsl", "xlsr_conformertcm_mdt_lora"]

seed: 1234

trainer:
  max_epochs: 20
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.00001 # 1e-5
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    factor: 0.5
    patience: 3
    min_lr: 1e-6

  cross_entropy_weight: [0.1, 0.9] # amplify bonafide loss
  args:
    adapter:
      r: 4
      target_modules: ["q_proj", "v_proj", "k_proj"]
      modules_to_save:  [] # conformer qkv
      lora_dropout: 0.1
      lora_alpha: 8
      #init_lora_weights: "gaussian"
  
  weighted_views:
    '1': 1
    '2': 1
    '3': 1
    '4': 1
  
data:
  batch_size: 32
  num_workers: 16
  pin_memory: true
  novel_ratio: 0.7
  replay_ratio: 0.3

  args:
    protocol_paths: ${oc.env:LARGE_CORPUS_FOR_CNSL_CONTINUOUS_PROTOCOLS}
    augmentation_methods: ["RawBoost12", "RawBoostdf", "none"] # "none" is the original data
    padding_type: repeat
    random_start: True
    is_dev_aug: False
    view_padding_configs:
      '1':
        padding_type: repeat
        random_start: True
      '2':
        padding_type: repeat
        random_start: True
      '3':
        padding_type: repeat
        random_start: True
      '4':
        padding_type: repeat
        random_start: True

logger:
  wandb:
    tags: ${tags}
    group: "replay_normal_largecorpus_multiview_cnsl"
  aim:
    experiment: "replay_normal_largecorpus_multiview_cnsl"

# @package _global_

defaults:
  - override /data: normal_largecorpus_multiview_cnsl
  - override /model: xlsr_sls
  - override /callbacks: default_loss_earlystop
  - override /trainer: default

tags: ["normal_largecorpus_multiview_cnsl", "xlsr_sls"]

seed: 1234

trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.00001
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    factor: 0.5
    patience: 3
    min_lr: 1e-6
  compile: true
  cross_entropy_weight: [0.4, 0.6]

data:
  batch_size: 16
  data_dir: data/DVC_DSD-Large-Corpus
  num_workers: 16
  pin_memory: true
  args:
    augmentation_methods: ["RawBoostdf", "RawBoost12", "none"]
    protocol_path: data/DVC_DSD-Large-Corpus/protocol.txt
    padding_type: repeat
    random_start: True
    view_padding_configs:
      "1":
        padding_type: repeat
        random_start: True
      "2":
        padding_type: repeat
        random_start: True
      "3":
        padding_type: repeat
        random_start: True
      "4":
        padding_type: repeat
        random_start: True

logger:
  wandb:
    tags: ${tags}
    group: "normal_largecorpus_multiview_cnsl"
  aim:
    experiment: "normal_largecorpus_multiview_cnsl"

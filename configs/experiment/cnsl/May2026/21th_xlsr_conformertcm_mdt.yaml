# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: normal_largecorpus_multiview_cnsl
  - override /model: xlsr_conformertcm_baseline_multiview
  - override /callbacks: default_loss_earlystop
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["normal_largecorpus_multiview_cnsl", "xlsr_conformertcm_baseline_multiview"]

seed: 1234

trainer:
  max_epochs: 20
  gradient_clip_val: 1.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 1e-5
    weight_decay: 0.01
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.CosineAnnealingLR
    _partial_: true
    T_max : 20
    eta_min : 1e-7

  compile: true
  cross_entropy_weight: [0.4, 0.6] # Balanced weights for cross entropy loss

data:
  batch_size: 16
  data_dir: data/DVC_DSD-Large-Corpus
  num_workers: 16
  pin_memory: true
  args:
    augmentation_methods: ["RawBoostdf", "RawBoost12", "none"]
    protocol_path: data/DVC_DSD-Large-Corpus/protocol.txt
    padding_type: repeat
    random_start: True
    #is_dev_aug: True # Use dev augmentation to verify the augmentation process
    view_padding_configs:
      '1':
        padding_type: repeat
        random_start: True
      '2':
        padding_type: repeat
        random_start: True
      '3':
        padding_type: repeat
        random_start: True
      '4':
        padding_type: repeat
        random_start: True


logger:
  wandb:
    tags: ${tags}
    group: "normal_largecorpus_multiview_cnsl"
  aim:
    experiment: "normal_largecorpus_multiview_cnsl"

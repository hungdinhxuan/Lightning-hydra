# @package _global_

defaults:
  - override /data: replay_normal_largecorpus_multiview_cnsl
  - override /model: v2/xlsr_conformertcm_mdt_distill_lora
  - override /callbacks: default_lora_loss_earlystop_logger
  - override /trainer: default

tags: ["replay_normal_largecorpus_multiview_cnsl", "xlsr_conformertcm_mdt_lora", "distill"]

seed: 1234

trainer:
  max_epochs: 5
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.00001
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    factor: 0.5
    patience: 3
    min_lr: 1e-6

  cross_entropy_weight: [0.3, 0.7]
  args:
    adapter:
      r: 4
      target_modules: ["q_proj", "v_proj", "k_proj", "out_proj", "fc1", "fc2", "final_proj", "LL", "qkv", "proj", "ht_proj"]
      modules_to_save: []
      lora_dropout: 0.1
      lora_alpha: 8

  weighted_views:
    '1': 1
    '2': 1
    '3': 1
    '4': 1

  distill:
    enabled: true
    teacher_ckpt_path: ${oc.env:BASE_LINE_FT_PATH}
    checkpoint_format: raw
    strict: true
    temperature: 4.0
    lambda_kd: 0.3
    lambda_feat: 0.0
    apply_on: replay_only
    feature_layer: null

data:
  batch_size: 16
  num_workers: 8
  pin_memory: true
  novel_ratio: 0.4
  replay_ratio: 0.6
  return_source: true

  args:
    protocol_paths: ${oc.env:LARGE_CORPUS_FOR_CNSL_CONTINUOUS_PROTOCOLS}
    augmentation_methods: ["RawBoost12", "RawBoostdf", "none"]
    padding_type: repeat
    random_start: True
    is_dev_aug: False
    view_padding_configs:
      '1':
        padding_type: repeat
        random_start: True
      '2':
        padding_type: repeat
        random_start: True
      '3':
        padding_type: repeat
        random_start: True
      '4':
        padding_type: repeat
        random_start: True

logger:
  wandb:
    tags: ${tags}
    group: "replay_normal_largecorpus_multiview_cnsl_distill"
  aim:
    experiment: "replay_normal_largecorpus_multiview_cnsl_distill"

# @package _global_
#
# EXP B (optimized WebDataset) with joint MDT × MBCT.
#
# Run:
#   WDS_DATA_DIR=... LARGE_CORPUS_FOR_CNSL=... LARGE_CORPUS_FOR_CNSL_PROTOCOLS=... XLSR_PRETRAINED_MODEL_PATH=... \
#   python src/train.py experiment=cnsl/April2026/exp_b_xlsr_conformertcm_mbct_mdt_optimized

defaults:
  - override /data: normal_largecorpus_MBCT_MDT_cnsl_optimized
  - override /model: v2/xlsr_conformertcm_mbct
  - override /callbacks: default_loss_earlystop
  - override /trainer: default

tags: ["exp_B", "normal_largecorpus_MBCT_MDT_cnsl_optimized", "xlsr_conformertcm_mbct_mdt_wds"]

seed: 1234

trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.AdamW
    lr: 0.00001
    weight_decay: 0.0001
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    factor: 0.5
    patience: 3
    min_lr: 1e-6
  compile: true
  cross_entropy_weight: [0.5, 0.5]
  weighted_views:
    1_normal: 1
    1_narrowband: 1
    1_wideband: 1
    2_normal: 1
    2_narrowband: 1
    2_wideband: 1
    3_normal: 1
    3_narrowband: 1
    3_wideband: 1
    4_normal: 1
    4_narrowband: 1
    4_wideband: 1

data:
  data_dir: data/DVC_DSD-Large-Corpus/raw/0_large-corpus_toys
  batch_size: 16
  num_workers: 16
  pin_memory: true
  args:
    protocol_path: data/protocols/cnsl/new_protocol_trim_vocoded_cleaned_v4_corrected.txt
    wds_data_dir: ${oc.env:WDS_DATA_DIR}
    wds_shm_dir: ${oc.env:WDS_SHM_DIR,null}
    wds_shard_shuffle: 100
    wds_sample_shuffle: 2000
    padding_type: repeat
    random_start: true
    augmentation_methods: ["RawBoostdf", "RawBoost12", "none"]

logger:
  wandb:
    tags: ${tags}
    group: "exp_B_mbct_mdt_full_wds"
  aim:
    experiment: "exp_B_mbct_mdt_full_wds"

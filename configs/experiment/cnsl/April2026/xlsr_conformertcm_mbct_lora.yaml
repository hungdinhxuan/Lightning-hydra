# @package _global_
#
# MBCT + LoRA on frozen baseline weights (default base: pretrained/S_241214_conf-1.pth).
# Data: NormalMBCTDataModule — see plans/20260402_mbct_experiment/PLAN.md
# Match eval settings with baseline: is_base_model_path_ln: false (raw state_dict load).
#
# Compare EER on m_ailabs_v7_only_la_codec_aug vs logs/results/benchmark_telephony/S_241214_conf-1/summary_results.txt
#
# Run:
#   LARGE_CORPUS_FOR_CNSL=data/DVC_DSD-Large-Corpus/raw/0_large-corpus_toys \
#   LARGE_CORPUS_FOR_CNSL_PROTOCOLS=data/protocols/cnsl/new_protocol_trim_vocoded_cleaned_v4_corrected.txt \
#   XLSR_PRETRAINED_MODEL_PATH=/path/to/xlsr.pth \
#   python src/train.py experiment=cnsl/April2026/xlsr_conformertcm_mbct_lora

defaults:
  - override /data: normal_largecorpus_MBCT_cnsl
  - override /model: v2/xlsr_conformertcm_mbct_lora
  - override /callbacks: default_lora_loss_earlystop_logger
  - override /trainer: default

tags: ["normal_largecorpus_MBCT_cnsl", "xlsr_conformertcm_mbct_lora"]

seed: 1234

trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
    lr: 0.00005
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.MultiStepLR
    _partial_: true
    milestones: [5, 15]
    gamma: 0.1
  cross_entropy_weight: [0.5, 0.5]
  weighted_views:
    normal: 1
    narrowband: 1
    wideband: 1
  base_model_path: pretrained/S_241214_conf-1.pth
  is_base_model_path_ln: false

data:
  data_dir: data/DVC_DSD-Large-Corpus/raw/0_large-corpus_toys
  batch_size: 14
  num_workers: 8
  pin_memory: true
  args:
    protocol_path: data/protocols/cnsl/new_protocol_trim_vocoded_cleaned_v4_corrected.txt
    padding_type: repeat
    random_start: true

logger:
  wandb:
    tags: ${tags}
    group: "normal_largecorpus_MBCT_cnsl"
  aim:
    experiment: "normal_largecorpus_MBCT_cnsl"

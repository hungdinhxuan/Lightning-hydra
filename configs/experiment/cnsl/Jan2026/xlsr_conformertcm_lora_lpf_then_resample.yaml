# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: normal_largecorpus_for_asvspoof5
  - override /model: v2/xlsr_conformertcm
  - override /callbacks: default_lora_loss_earlystop_logger
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["normal_largecorpus_for_asvspoof5", "v2/xlsr_conformertcm"]

seed: 1234

trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    lr: 0.0001
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    factor: 0.5
    patience: 3
    min_lr: 1e-6
  compile: true
  cross_entropy_weight: [0.7, 0.3] # Balanced weights for cross entropy loss
  adapter_type: "lora"
  args:
    adapter:
      r: 8
      target_modules: ["q_proj", "v_proj", "k_proj", "out_proj", "fc1", "fc2", "final_proj", "LL", "qkv", "proj", "ht_proj"]
      #target_modules: ["q_proj", "v_proj", "k_proj", "out_proj"] 
      modules_to_save:  [] # conformer qkv
      lora_dropout: 0.0
      lora_alpha: 16
      #init_lora_weights: "gaussian"
    conformer:
      emb_size: 144
      heads: 4
      kernel_size: 31
      n_encoders: 4
      type: "conv" # conv_res2net, conv_seblock, conv_res2net_seblock
      pooling: "first"

data:
  batch_size: 32
  data_dir: data/DVC_DSD-Large-Corpus
  num_workers: 16
  pin_memory: true
  args:
    augmentation_methods: ['telephony_8k_lpf2000', 'telephony_8k_lpf2800', 'telephony_8k_lpf3400', 'telephony_8k_lpf3800', 'telephony_8k_bandpass', 'none']
    protocol_path: data/DVC_DSD-Large-Corpus/protocol.txt
    padding_type: repeat
    random_start: True
    #is_dev_aug: True # Use dev augmentation to verify the augmentation process
    view_padding_configs:
      '1':
        padding_type: repeat
        random_start: True
      '2':
        padding_type: repeat
        random_start: True
      '3':
        padding_type: repeat
        random_start: True
      '4':
        padding_type: repeat
        random_start: True


logger:
  wandb:
    tags: ${tags}
    group: "normal_largecorpus_for_asvspoof5"
  aim:
    experiment: "normal_largecorpus_for_asvspoof5"

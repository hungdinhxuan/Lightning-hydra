# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: normal_largecorpus_for_asvspoof5
  - override /model: v2/aasist
  - override /callbacks: default_loss
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["normal_largecorpus_for_asvspoof5", "v2/aasist"]

seed: 1234

trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    _target_: torch.optim.AdamW
    _partial_: true
    lr: 0.0001
    weight_decay: 0.0001
  scheduler:
    _target_: torch.optim.lr_scheduler.ReduceLROnPlateau
    _partial_: true
    factor: 0.5
    patience: 3
    min_lr: 1e-6
  compile: false

data:
  batch_size: 32
  num_workers: 16
  pin_memory: true
  args:
    trim_length: 64000
    augmentation_methods: ["RawBoost12", "none"]
    padding_type: repeat
    random_start: True


logger:
  wandb:
    tags: ${tags}
    group: "normal_largecorpus_for_asvspoof5"
  aim:
    experiment: "normal_largecorpus_for_asvspoof5"

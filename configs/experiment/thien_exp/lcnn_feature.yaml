# @package _global_

defaults:
  - override /data: feature_lcnn_protocol
  - override /model: lcnn
  - override /callbacks: default
  - override /trainer: default
  - override /logger: null

tags: ["lcnn", "feature", "smoke"]

train: true
test: false

trainer:
  accelerator: cpu
  devices: 1
  max_epochs: 100

data:
  batch_size: 32
  num_workers: 16
  pin_memory: true
  args:
    max_frames: 32

model:
  net:
    dropout: 0.0


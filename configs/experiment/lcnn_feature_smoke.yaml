# @package _global_

defaults:
  - override /data: feature_lcnn_protocol
  - override /model: lcnn
  - override /callbacks: default
  - override /trainer: default
  - override /logger: null

tags: ["lcnn", "feature", "smoke"]

train: true
test: false

trainer:
  accelerator: cpu
  devices: 1
  max_epochs: 1
  limit_train_batches: 1
  limit_val_batches: 1
  num_sanity_val_steps: 0

data:
  batch_size: 2
  num_workers: 0
  pin_memory: false
  args:
    max_frames: 32

model:
  net:
    dropout: 0.0


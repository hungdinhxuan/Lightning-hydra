# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: standard2_aux
  - override /model: v2/xlsr_beats_conformertcm_aux
  - override /callbacks: default_loss_earlystop
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["standard2_aux", "xlsr_beats_conformertcm_aux"]

seed: 1234

callbacks:
  model_checkpoint:
    monitor: "val/total_loss"
    mode: "min"
    save_top_k: 5
    save_last: True
    filename: "epoch_{epoch:03d}"
    dirpath: ${paths.output_dir}/checkpoints
  early_stopping:
    monitor: "val/total_loss"
    mode: "min"
    patience: 10


trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    lr: 0.00001
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.MultiStepLR
    _partial_: true
    milestones:
      - 5
    gamma : 0.1 # Multiplicative factor of learning rate decay.
  compile: true
  cross_entropy_weight: [0.1, 0.9] # Balanced weights for cross entropy loss

  args:
    conformer:
      is_beats_fixed: False
      aux_num_classes: 28
  weighted_views:
    '1': 1.0
    '2': 1.0
    '3': 1.0
    '4': 1.0
data:
  batch_size: 16
  data_dir: ${oc.env:WILD_SPOOF_PATH}
  num_workers: 8
  pin_memory: true
  args:
    augmentation_methods: ["RawBoostdf", "none"]
    protocol_path: ${oc.env:WILD_SPOOF_PROTOCOL_PATH}
    padding_type: repeat
    random_start: True
    #is_dev_aug: True # Use dev augmentation to verify the augmentation process

logger:
  wandb:
    tags: ${tags}
    group: "standard2_aux"
  aim:
    experiment: "standard2_aux"

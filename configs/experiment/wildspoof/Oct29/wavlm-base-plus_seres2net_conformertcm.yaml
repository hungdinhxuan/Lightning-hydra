# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: normal_largecorpus_for_asvspoof5
  - override /model: v2/wavlm-base-plus_seres2net_conformertcm
  - override /callbacks: default_loss_earlystop
  - override /trainer: default

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["normal_largecorpus_for_asvspoof5", "wavlm-base-plus_seres2net_conformertcm"]

seed: 1234

trainer:
  max_epochs: 100
  gradient_clip_val: 0.0
  accelerator: cuda

model:
  optimizer:
    lr: 0.00001
    weight_decay: 0.0001
  net: null
  scheduler:
    _target_: torch.optim.lr_scheduler.MultiStepLR
    _partial_: true
    milestones:
      - 5
    gamma : 0.1 # Multiplicative factor of learning rate decay.
  compile: true
  cross_entropy_weight: [0.1, 0.9] # Balanced weights for cross entropy loss

data:
  batch_size: 16
  data_dir: ${oc.env:WILD_SPOOF_PATH}
  num_workers: 8
  pin_memory: true
  args:
    augmentation_methods: ["RawBoostdf", "none"]
    protocol_path: ${oc.env:WILD_SPOOF_PROTOCOL_PATH}
    padding_type: repeat
    random_start: True
    #is_dev_aug: True # Use dev augmentation to verify the augmentation process

logger:
  wandb:
    tags: ${tags}
    group: "normal_largecorpus_for_asvspoof5"
  aim:
    experiment: "normal_largecorpus_for_asvspoof5"

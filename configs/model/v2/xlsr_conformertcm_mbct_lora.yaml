_target_: src.models.v2.xlsr_conformertcm_mbct_module.XLSRConformertcmMBCTLitModule

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.00005
  weight_decay: 0.0001

scheduler:
  _target_: torch.optim.lr_scheduler.MultiStepLR
  _partial_: true
  milestones: [5, 15]
  gamma: 0.1

args:
  conformer:
    emb_size: 144
    heads: 4
    kernel_size: 31
    n_encoders: 4
    type: "conv"
    pooling: "first"

  adapter:
    r: 8
    target_modules:
      - q_proj
      - v_proj
      - k_proj
      - out_proj
      - fc1
      - fc2
      - final_proj
      - LL
      - qkv
      - proj
      - ht_proj
    modules_to_save: []
    lora_dropout: 0.0
    lora_alpha: 16

ssl_pretrained_path: ${oc.env:XLSR_PRETRAINED_MODEL_PATH}
cross_entropy_weight: [0.5, 0.5]
adapter_type: lora
base_model_path: pretrained/S_241214_conf-1.pth
is_base_model_path_ln: false

weighted_views:
  normal: 1
  narrowband: 1
  wideband: 1

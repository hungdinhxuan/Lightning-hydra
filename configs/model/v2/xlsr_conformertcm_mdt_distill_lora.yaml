_target_: src.models.v2.xlsr_conformertcm_mdt_distill_module.XLSRConformertcmMDTDistillLitModule

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.000001
  weight_decay: 0.0001

scheduler: null

args:
  conformer:
    emb_size: 144
    heads: 4
    kernel_size: 31
    n_encoders: 4
    type: "conv"
    pooling: "first"

  adapter:
    r: 16
    target_modules: ["q_proj", "v_proj", "k_proj"]
    modules_to_save: ""
    lora_dropout: 0.0
    lora_alpha: 8

ssl_pretrained_path: ${oc.env:XLSR_PRETRAINED_MODEL_PATH}
cross_entropy_weight: [0.1, 0.9]
adapter_type: "lora"
base_model_path: ${oc.env:BASE_LINE_FT_PATH}
compile_model: false

distill:
  enabled: true
  teacher_ckpt_path: ${oc.env:BASE_LINE_FT_PATH}
  checkpoint_format: raw
  strict: true
  temperature: 4.0
  lambda_kd: 0.3
  lambda_feat: 0.0
  apply_on: replay_only
  feature_layer: null

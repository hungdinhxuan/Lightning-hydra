_target_: src.models.v2.xlsr_conformertcm_mbct_module.XLSRConformertcmMBCTLitModule

optimizer:
  _target_: torch.optim.Adam
  _partial_: true
  lr: 0.000001
  weight_decay: 0.0001

scheduler: null

args:
  conformer:
    emb_size: 144
    heads: 4
    kernel_size: 31
    n_encoders: 4
    type: "conv"
    pooling: "first"

  adapter:
    r: 16
    target_modules: ["q_proj", "v_proj", "k_proj"]
    modules_to_save: ""
    lora_dropout: 0.0
    lora_alpha: 8

ssl_pretrained_path: ${oc.env:XLSR_PRETRAINED_MODEL_PATH}
cross_entropy_weight: [0.5, 0.5]
adapter_type: null
base_model_path: null

weighted_views:
  normal: 1
  narrowband: 1
  wideband: 1

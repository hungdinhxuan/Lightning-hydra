_target_: src.data.normal_datamodule_optimized.NormalDataModule
data_dir: ${oc.env:LARGE_CORPUS_FOR_CNSL}
batch_size: 2
num_workers: 4
pin_memory: True
enable_cache: false
args:
  protocol_path: ${oc.env:LARGE_CORPUS_FOR_CNSL_PROTOCOLS}
  wds_data_dir: ${oc.env:WDS_DATA_DIR}
  wds_shm_dir: ${oc.env:WDS_SHM_DIR,null}
  wds_use_brace_pattern: true
  wds_shard_shuffle: 100
  wds_sample_shuffle: 2000
  wds_eval_return_utt_id: true

  wav_samp_rate: 16000
  trim_length: 64000
  padding_type: repeat
  random_start: true

  augmentation_methods: ["RawBoost12", "none"]
  aug_dir: ${oc.env:AUG_PATH}
  noise_path: ${oc.env:NOISE_PATH}
  rir_path: ${oc.env:RIR_PATH}
  online_aug: true
  
  enable_cache: false  # Whether to enable caching in args
  nBands: 5
  minF: 20
  maxF: 8000
  minBW: 100
  maxBW: 1000
  minCoeff: 10
  maxCoeff: 100
  minG: 0
  maxG: 0
  minBiasLinNonLin: 5
  maxBiasLinNonLin: 20
  N_f: 5
  P: 10
  g_sd: 2
  SNRmin: 10
  SNRmax: 40